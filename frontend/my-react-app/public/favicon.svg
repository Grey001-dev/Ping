<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      /* CSS Styles directly inside the logo file */
      .brand-color {
        fill: #16c657; /* Your vibrant green */
      }
      
      .bar {
        transform-origin: bottom;
        animation: pulse 2s infinite ease-in-out;
      }

      /* Optional: You can even use system media queries! */
      @media (prefers-color-scheme: dark) {
        .brand-color {
          fill: #4ade80; /* Brighter neon green for dark browser tabs */
        }
      }
    </style>
  </defs>

  <g class="brand-color">
    <rect x="15" y="15" width="10" height="20" rx="3" class="bar" />
    <rect x="32" y="10" width="10" height="25" rx="3" class="bar" />
    <rect x="49" y="5"  width="10" height="30" rx="3" class="bar" />
    <rect x="66" y="0"  width="10" height="35" rx="3" class="bar" />

    <path d="M 15 45 
             L 70 45 
             A 20 20 0 0 1 70 85 
             L 40 85 
             A 5 5 0 0 1 35 80
             L 35 95 
             A 5 5 0 0 1 25 95
             L 25 55
             A 5 5 0 0 1 30 50
             L 15 50 
             A 5 5 0 0 1 15 45 Z" />
  </g>
</svg>
